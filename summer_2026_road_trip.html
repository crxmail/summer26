    <!-- One self-contained .html file. Driving routes: Google Maps Directions when ?gmaps_key=… or window.__GMAPS_API_KEY__; otherwise a public driving-route API (no key). Map tiles: OSM. -->
    <title>Summer 2026 Road Trip - Interactive Itinerary</title>
    <script>
        (function registerStandaloneManifest() {
            if (!window.isSecureContext) return;
            const p = (location.protocol || '').toLowerCase();
            if (p === 'file:' || p === 'content:' || p === 'blob:') return;
            if (document.querySelector('link[rel="manifest"][data-trip-pwa]')) return;
            const pageUrl = location.origin + location.pathname + location.search;
            const path = location.pathname || '/';
            const slash = path.lastIndexOf('/');
            const scopePath = slash >= 0 ? path.slice(0, slash + 1) : '/';
            const scopeUrl = new URL(scopePath, location.origin).href;
            const manifest = {
                name: document.title || 'Summer 2026 Road Trip',
                short_name: 'Road Trip 2026',
                id: pageUrl,
                start_url: pageUrl,
                scope: scopeUrl,
                display: 'standalone',
                background_color: '#667eea',
                theme_color: '#667eea'
            };
            const blob = new Blob([JSON.stringify(manifest)], { type: 'application/manifest+json' });
            const link = document.createElement('link');
            link.rel = 'manifest';
            link.href = URL.createObjectURL(blob);
            link.setAttribute('data-trip-pwa', '1');
            document.head.appendChild(link);
        })();
    </script>

        /**

         * restrict by HTTP referrer. Pass ?gmaps_key=… or set window.__GMAPS_API_KEY__.
         * Returns null if the script cannot load or the request fails.
         */
        async function fetchGoogleDirectionsDrive(lat1, lon1, lat2, lon2, signal) {
            try {
                await loadGoogleMapsScriptOnce();
            } catch {
                return null;
            }
            if (!window.google || !window.google.maps || !window.google.maps.DirectionsService) return null;
            if (signal.aborted) throw new DOMException('Aborted', 'AbortError');
            const svc = new window.google.maps.DirectionsService();
            return await new Promise((resolve, reject) => {
                let settled = false;
                const tmr = setTimeout(() => {
                    if (settled) return;
                    settled = true;
                    if (signal.aborted) reject(new DOMException('Aborted', 'AbortError'));
                    else resolve(null);
                }, 34000);
                svc.route(
                    {
                        origin: { lat: lat1, lng: lon1 },
                        destination: { lat: lat2, lng: lon2 },
                        travelMode: window.google.maps.TravelMode.DRIVING,
                        provideRouteAlternatives: false
                    },
                    (result, status) => {
                        if (settled) return;
                        settled = true;
                        clearTimeout(tmr);
                        if (signal.aborted) {
                            reject(new DOMException('Aborted', 'AbortError'));
                            return;
                        }
                        if (status !== window.google.maps.DirectionsStatus.OK || !result || !result.routes || !result.routes[0]) {
                            resolve(null);
                            return;
                        }
                        const r = result.routes[0];
                        const path = r.overview_path || [];
                        const latlngs =
                            path.length > 0 ? path.map(ll => L.latLng(ll.lat(), ll.lng())) : [];
                        let meters = 0;
                        let seconds = 0;
                        for (const leg of r.legs || []) {
                            meters += leg.distance && leg.distance.value != null ? leg.distance.value : 0;
                            seconds += leg.duration && leg.duration.value != null ? leg.duration.value : 0;
                        }
                        resolve({
                            latlngs,
                            distanceKm: meters / 1000,
                            durationSec: seconds
                        });
                    }
                );
            });
        }

        /** Public driving-route HTTP API (no browser key). Used when Google Directions is unavailable. */
        async function fetchPublicDrivingRoute(lat1, lon1, lat2, lon2, signal) {

            try {
                const res = await fetch(url, { signal });
                if (signal.aborted) throw new DOMException('Aborted', 'AbortError');
                if (!res.ok) return null;
                const data = await res.json();
                if (signal.aborted) throw new DOMException('Aborted', 'AbortError');
                const route0 = data.routes && data.routes[0];
                const coords = route0 && route0.geometry && route0.geometry.coordinates;
                if (!coords || !coords.length) return null;
                const latlngs = coords.map(([lon, lat]) => L.latLng(lat, lon));
                return {
                    latlngs,
                    distanceKm: route0.distance / 1000,
                    durationSec: route0.duration
                };
            } catch (e) {
                if (e && e.name === 'AbortError') throw e;
                return null;
            }
        }

        async function fetchDrivingRouteForEndpoints(lat1, lon1, lat2, lon2, signal) {

                const g = await fetchGoogleDirectionsDrive(lat1, lon1, lat2, lon2, signal);
                if (g && g.latlngs && g.latlngs.length >= 2) return g;
            }
            const p = await fetchPublicDrivingRoute(lat1, lon1, lat2, lon2, signal);
            if (p && p.latlngs && p.latlngs.length >= 2) return p;
            return null;
        }

            return { durationSec: full.durationSec, distanceKm: full.distanceKm };

        const FERRY_CRUISE_SPEED_MIN_KMH = 22;
        const FERRY_CRUISE_SPEED_MAX_KMH = 48;
        const FERRY_CRUISE_SPEED_FALLBACK_KMH = 35;

        /** Implied average sea speed from this leg’s great-circle distance and scheduled duration (km/h, clamped). */
        function impliedFerryCruiseSpeedKmh(trip) {
            const seaKm = haversineKm(trip.lat1, trip.lon1, trip.lat2, trip.lon2);
            const mins = Number(trip.timeMinutes);
            if (!Number.isFinite(seaKm) || seaKm < 20 || !Number.isFinite(mins) || mins <= 0) {
                return FERRY_CRUISE_SPEED_FALLBACK_KMH;
            }
            const implied = seaKm / (mins / 60);
            return Math.min(FERRY_CRUISE_SPEED_MAX_KMH, Math.max(FERRY_CRUISE_SPEED_MIN_KMH, implied));
        }

        /** Driving to ferry departure + sea time from great-circle ÷ implied cruise speed. */
        async function estimateFerryLegEtaFromUser(uLon, uLat, trip, signal) {
            const toDep = await fetchDrivingUserToLatLon(uLon, uLat, trip.lon1, trip.lat1, signal);
            if (signal.aborted) throw new DOMException('Aborted', 'AbortError');
            if (!toDep) return null;
            const seaKm = haversineKm(trip.lat1, trip.lon1, trip.lat2, trip.lon2);
            const v = impliedFerryCruiseSpeedKmh(trip);
            const seaSec = (seaKm / v) * 3600;
            return {
                durationSec: toDep.durationSec + seaSec,
                distanceKm: toDep.distanceKm + seaKm,
                roadKm: toDep.distanceKm,
                seaKm,
                ferryKmh: v
            };
        }

        function formatDurationFromSec(sec) {
            if (sec == null || !Number.isFinite(sec) || sec < 0) return '—';
            const totalMin = Math.round(sec / 60);
            const h = Math.floor(totalMin / 60);
            const m = totalMin % 60;
            if (h === 0) return `${m}m`;
            if (m === 0) return `${h}h`;
            return `${h}h ${m}m`;
        }

        function displayKmForTrip(trip) {
            if (trip.listingDistanceKm != null && Number.isFinite(trip.listingDistanceKm)) {
                return Math.round(trip.listingDistanceKm);
            }
            if (trip.computedDistanceKm != null && Number.isFinite(trip.computedDistanceKm)) {
                return Math.round(trip.computedDistanceKm);
            }
            return trip.distance;
        }

        function displayTimeForTrip(trip) {
            if (trip.listingTimeMinutes != null && Number.isFinite(trip.listingTimeMinutes)) {
                return formatDurationFromSec(trip.listingTimeMinutes * 60);
            }
            if (trip.computedTimeStr) return trip.computedTimeStr;
            return trip.time;
        }

        function tripById(id) {
            return trips.find(t => t.id === id) || null;
        }

        /** False for local file/content URLs, non-secure pages, or missing Geolocation API — ETA is hidden in those cases. */
        function isEtaFromLocationAvailable() {
            if (!('geolocation' in navigator)) return false;
            if (!window.isSecureContext) return false;
            const proto = (window.location.protocol || '').toLowerCase();
            if (proto === 'file:' || proto === 'content:' || proto === 'blob:') return false;
            return true;
        }

        function syncEtaFromHereUi() {
            const btn = document.getElementById('etaFromHereBtn');
            if (!btn) return;
            const envOk = isEtaFromLocationAvailable();
            const sole = selectedIds.size === 1 ? tripById([...selectedIds][0]) : null;
            const eligible = Boolean(
                envOk && sole && (sole.type === 'drive' || sole.type === 'ferry')
            );
            btn.toggleAttribute('hidden', !eligible);
            btn.setAttribute('aria-hidden', eligible ? 'false' : 'true');
            if (!eligible) btn.disabled = false;
        }

        function effectiveRouteHighlightTripId() {
            return mapRouteFocusTripId != null ? mapRouteFocusTripId : mapRouteHoverTripId;
        }

        function rememberLayerBaseline(layer) {
            if (!layer || layer._layerBaselineSaved) return;
            layer._layerBaselineSaved = true;
            if (layer instanceof L.CircleMarker) {
                layer._bOpacity = layer.options.opacity != null ? layer.options.opacity : 1;
                layer._bFillOpacity = layer.options.fillOpacity != null ? layer.options.fillOpacity : 0.98;
                layer._bWeight = layer.options.weight != null ? layer.options.weight : 3;
            } else if (layer instanceof L.Polyline) {
                layer._bOpacity = layer.options.opacity != null ? layer.options.opacity : 1;
                layer._bWeight = layer.options.weight != null ? layer.options.weight : 4;
            }
        }

        function layerMatchesHighlightTrip(layer, active) {
            if (active == null) return true;
            if (layer._routeTripId != null) return layer._routeTripId === active;
            if (layer._endpointTripIds && layer._endpointTripIds.length)
                return layer._endpointTripIds.indexOf(active) >= 0;
            return false;
        }

        function applyMapRouteFocusStyles() {
            const active = effectiveRouteHighlightTripId();
            legMarkers.forEach(layer => {
                if (!layer || !map.hasLayer(layer)) return;
                if (layer._isSavedStar) return;
                rememberLayerBaseline(layer);
                const dim = active != null && !layerMatchesHighlightTrip(layer, active);
                if (layer instanceof L.CircleMarker) {
                    if (dim) {
                        layer.setStyle({
                            opacity: 0.5,
                            fillOpacity: 0.45,
                            weight: layer._bWeight
                        });
                    } else {
                        layer.setStyle({
                            opacity: layer._bOpacity,
                            fillOpacity: layer._bFillOpacity,
                            weight: layer._bWeight
                        });
                    }
                } else if (layer instanceof L.Polyline) {
                    if (dim) {
                        layer.setStyle({
                            opacity: 0.38,
                            weight: layer._bWeight
                        });
                    } else {
                        layer.setStyle({ opacity: layer._bOpacity, weight: layer._bWeight });
                    }
                }
            });
        }

        function syncListRouteMapFocusClass() {
            document.querySelectorAll('.leg-item').forEach(el => {
                const id = Number(el.dataset.legId);
                el.classList.toggle('leg-item--route-map-focus', mapRouteFocusTripId != null && id === mapRouteFocusTripId);
            });
        }

        function resetMapRouteFocusState() {
            mapRouteFocusTripId = null;
            mapRouteHoverTripId = null;
            if (mapRouteFocusPopup && map) {
                // Null first so the popupclose listener's guard is already false
                // when closePopup fires the event, preventing infinite recursion.
                const p = mapRouteFocusPopup;
                mapRouteFocusPopup = null;
                map.closePopup(p);
            }
            syncListRouteMapFocusClass();
            applyMapRouteFocusStyles();
        }

        function setMapRouteHoverTrip(tripId) {
            if (selectedIds.size < 2) return;
            if (!selectedIds.has(tripId)) return;
            mapRouteHoverTripId = tripId;
            applyMapRouteFocusStyles();
        }

        function clearMapRouteHoverTrip() {
            if (mapRouteHoverTripId == null) return;
            mapRouteHoverTripId = null;
            applyMapRouteFocusStyles();
        }

        function collectBoundsForTripLayers(tripId) {
            let b = null;
            legMarkers.forEach(layer => {
                if (!layer || !layer.getBounds || !layer.getBounds().isValid()) return;
                const match =
                    layer._routeTripId === tripId ||
                    (layer._endpointTripIds && layer._endpointTripIds.indexOf(tripId) >= 0);
                if (!match) return;
                const bb = layer.getBounds();
                if (!b) b = L.latLngBounds(bb.getSouthWest(), bb.getNorthEast());
                else b.extend(bb);
            });
            return b;
        }

        function tripRoutePopupHtml(trip) {
            const accName = (trip.accommodation && String(trip.accommodation).trim()) || '';
            const arrAddr = (trip.stayAddress && String(trip.stayAddress).trim()) || '';
            const dateStr = trip.date ? escapeHtml(String(trip.date).trim()) : '';
            const km = displayKmForTrip(trip);
            const timeStr = escapeHtml(displayTimeForTrip(trip));
            const mode = trip.type === 'ferry' ? 'Ferry' : 'Drive';
            // Primary label: property name; secondary: street address (if different)
            const primaryLabel = accName || arrAddr || trip.to || '—';
            const secondaryAddr = arrAddr && arrAddr !== primaryLabel ? arrAddr : '';
            const mapsHref = mapsHrefForTripRole(trip, 'end');
            const mapsBlock = mapsHref
                ? `<div class="trip-endpoint-actions"><a class="trip-endpoint-maps" href="${escapeHref(mapsHref)}" target="_blank" rel="noopener noreferrer">Open in Google Maps</a></div>`
                : '';
            let stayLink = '';
            if (trip.stayUrl && !isGoogleMapsUrl(trip.stayUrl)) {
                stayLink = `<div class="trip-endpoint-actions" style="margin-top:6px"><a class="trip-endpoint-maps" href="${escapeHref(trip.stayUrl)}" target="_blank" rel="noopener noreferrer">Open stay / booking link</a></div>`;
            }
            return `<div class="trip-endpoint-popup-card">
                <div class="trip-endpoint-k">${dateStr || 'Route details'}</div>
                <div class="trip-endpoint-meta" style="margin-bottom:6px">${escapeHtml(trip.from)} → ${escapeHtml(trip.to)}</div>
                <div class="trip-endpoint-k">Distance & time</div>
                <div class="trip-endpoint-meta">${km} km · ${timeStr} · ${escapeHtml(mode)}</div>
                <div class="trip-endpoint-k" style="margin-top:10px">Arrival / stay</div>
                <div class="trip-endpoint-place" style="font-size:14px">${escapeHtml(primaryLabel)}</div>
                ${secondaryAddr ? `<div class="trip-endpoint-note">${escapeHtml(secondaryAddr)}</div>` : ''}
                ${mapsBlock}
                ${stayLink}
            </div>`;
        }

        function handleRoutePolylineClick(tripId, e) {
            if (e && e.originalEvent) e.originalEvent._legRouteHandled = true;
            if (e && typeof L !== 'undefined' && L.DomEvent) L.DomEvent.stop(e);
            const trip = tripById(tripId);
            if (!trip) return;
            mapRouteFocusTripId = tripId;
            mapRouteHoverTripId = null;
            syncListRouteMapFocusClass();
            applyMapRouteFocusStyles();
            const row = document.querySelector(`.leg-item[data-leg-id="${tripId}"]`);
            if (row) row.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
            const b = collectBoundsForTripLayers(tripId);
            if (b && b.isValid()) map.fitBounds(b.pad(0.1), { padding: [48, 48] });
            if (mapRouteFocusPopup) map.closePopup(mapRouteFocusPopup);
            const latlng = e && e.latlng ? e.latlng : map.getCenter();
            mapRouteFocusPopup = L.popup({
                className: tripEndpointPopupOptions.className,
                closeButton: true,
                autoPan: true,
                maxWidth: tripEndpointPopupOptions.maxWidth
            })
                .setLatLng(latlng)
                .setContent(tripRoutePopupHtml(trip))
                .openOn(map);
        }

        function refreshLegMetricsLine(trip) {
            const list = document.getElementById('legsList');
            if (!list) return;
            const row = list.querySelector(`.leg-item[data-leg-id="${trip.id}"] .leg-line2-meta`);
            if (!row) return;
            const km = displayKmForTrip(trip);
            const timeStr = displayTimeForTrip(trip);
            row.textContent = `${km} km · ${timeStr} · ${trip.type === 'ferry' ? 'ferry' : 'drive'}`;
        }

        /** Summary totals: selected legs only; if nothing is selected, treat as entire trip. */
        function tripsForSummaryTotals() {
            if (!selectedIds.size) return trips;
            return trips.filter(t => selectedIds.has(t.id));
        }

        function updateSummaryStats() {
            let driveKm = 0;
            let driveSec = 0;
            let ferryMin = 0;
            for (const t of tripsForSummaryTotals()) {
                if (t.type === 'ferry') {
                    ferryMin += t.timeMinutes || 0;
                    continue;
                }
                if (t.type === 'drive') {
                    let km = Number(t.distance) || 0;
                    if (t.listingDistanceKm != null && Number.isFinite(t.listingDistanceKm)) {
                        km = t.listingDistanceKm;
                    } else if (t.computedDistanceKm != null && Number.isFinite(t.computedDistanceKm)) {
                        km = t.computedDistanceKm;
                    }
                    driveKm += km;
                    let sec = (Number(t.timeMinutes) || 0) * 60;
                    if (t.listingTimeMinutes != null && Number.isFinite(t.listingTimeMinutes)) {
                        sec = t.listingTimeMinutes * 60;
                    } else if (t.computedDurationSec != null && Number.isFinite(t.computedDurationSec)) {
                        sec = t.computedDurationSec;
                    }
                    driveSec += sec;
                }
            }
            const elKm = document.getElementById('summary-driving-km');
            const elTime = document.getElementById('summary-drive-time');
            const elFerry = document.getElementById('summary-ferry-time');
            if (elKm) elKm.textContent = `${Math.round(driveKm).toLocaleString('en-US')} km`;
            if (elTime) elTime.textContent = formatDurationFromSec(driveSec);
            if (elFerry) elFerry.textContent = formatDurationFromSec(ferryMin * 60);
        }

        function applyDirectionsRouteMetrics(trip, route) {
            if (!route || route.distanceKm == null || route.durationSec == null) return;
            trip.computedDistanceKm = route.distanceKm;
            trip.computedDurationSec = route.durationSec;
            trip.computedTimeStr = formatDurationFromSec(route.durationSec);
            refreshLegMetricsLine(trip);
            updateSummaryStats();
        }

        function clearDynamicMapLayers() {
            legMarkers.forEach(layer => {
                if (layer && map.hasLayer(layer)) map.removeLayer(layer);
            });
            legMarkers = [];
        }

        function setRowVisual(rowEl, on) {
            rowEl.classList.toggle('active', on);
            const cb = rowEl.querySelector('.leg-cb');
            if (cb) cb.checked = on;
        }

        function applySelectionToDom() {
            document.querySelectorAll('.leg-item').forEach(div => {
                const id = Number(div.dataset.legId);
                setRowVisual(div, selectedIds.has(id));
            });
            updateSummaryStats();
        }

        function setSelection(nextSet, opts) {
            const union = opts && opts.union;
            if (union) {
                nextSet.forEach(id => selectedIds.add(id));
            } else {
                selectedIds.clear();
                nextSet.forEach(id => selectedIds.add(id));
            }
            applySelectionToDom();
            invalidateFromHereEta();
            syncMapToSelection();
        }

        function toggleId(id) {
            if (selectedIds.has(id)) selectedIds.delete(id);
            else selectedIds.add(id);
            applySelectionToDom();
            invalidateFromHereEta();
            syncMapToSelection();
        }

        const tripEndpointPopupOptions = {
            className: 'trip-endpoint-popup',
            closeButton: true,
            autoPan: true,
            autoPanPadding: L.point(16, 48),
            maxWidth: 300
        };

        /** ~1 m grouping so shared endpoints between legs collapse to one marker. */
        const ENDPOINT_CLUSTER_DECIMALS = 5;

        let savedPlacesGeojsonFeatures = [];

        (function loadEmbeddedSavedPlacesGeoJson() {
            const el = document.getElementById('embeddedSavedPlacesGeoJson');
            if (!el) return;
            const raw = el.textContent && el.textContent.trim();
            if (!raw) return;
            try {
                const fc = JSON.parse(raw);
                savedPlacesGeojsonFeatures = (fc && fc.features) || [];
            } catch (e) {
                console.warn('Embedded Saved Places JSON could not be parsed', e);
            }
        })();

        const savedStarDivIcon = L.divIcon({
            className: 'saved-place-marker',
            html: '<div class="saved-place-pin" role="button" tabindex="0" aria-label="Saved place — tap to open details">★</div>',
            iconSize: [26, 26],
            iconAnchor: [13, 13],
            popupAnchor: [0, -18],
            tooltipAnchor: [0, -18]
        });

        const savedPlacePopupOptions = {
            className: 'trip-endpoint-popup',
            maxWidth: 300,
            autoPan: true,
            autoPanPadding: L.point(44, 44),
            closeButton: true,
            keepInView: true
        };

        /** Max distance (km) from route geometry, leg endpoints, or leg chord to show a starred place. */
        const SAVED_PLACE_CORRIDOR_KM = 72;

        function googleMapsUrlToHttps(url) {
            if (!url || typeof url !== 'string') return '';
            try {
                const u = new URL(url, 'https://www.google.com/maps');
                if (u.protocol === 'http:') u.protocol = 'https:';
                return u.href;
            } catch {
                return String(url).replace(/^http:/i, 'https:');
            }
        }

        function coordsFromSavedPlaceFeature(f) {
            const c = f && f.geometry && f.geometry.coordinates;
            if (!c || c.length < 2) return null;
            let lon = Number(c[0]);
            let lat = Number(c[1]);
            const p = f.properties || {};
            if (
                (Math.abs(lat) < 1e-8 && Math.abs(lon) < 1e-8) ||
                !Number.isFinite(lat) ||
                !Number.isFinite(lon)
            ) {
                const url = p.google_maps_url;
                if (url) {
                    let ustr = String(url);
                    try {
                        ustr = decodeURIComponent(ustr);
                    } catch {
                        /* ignore */
                    }
                    const m = ustr.match(/[?&]q=([-0-9.]+),([-0-9.]+)(?:&|$)/i);
                    if (m) {
                        const a = parseFloat(m[1]);
                        const b = parseFloat(m[2]);
                        if (Number.isFinite(a) && Number.isFinite(b)) {
                            if (Math.abs(a) <= 90 && Math.abs(b) <= 180) {
                                lat = a;
                                lon = b;
                            } else if (Math.abs(b) <= 90 && Math.abs(a) <= 180) {
                                lat = b;
                                lon = a;
                            }
                        }
                    }
                }
            }
            if (!Number.isFinite(lat) || !Number.isFinite(lon)) return null;
            if (Math.abs(lat) < 1e-8 && Math.abs(lon) < 1e-8) return null;
            if (Math.abs(lat) > 90 || Math.abs(lon) > 180) return null;
            return { lat, lon };
        }

        function minDistKmPointToGreatCircleSampled(latP, lonP, lat1, lon1, lat2, lon2, samples) {
            const n = Math.max(4, samples | 0);
            let minD = Infinity;
            for (let i = 0; i <= n; i++) {
                const t = i / n;
                const la = lat1 + t * (lat2 - lat1);
                const lo = lon1 + t * (lon2 - lon1);
                const d = haversineKm(latP, lonP, la, lo);
                if (d < minD) minD = d;
            }
            return minD;
        }

        function minDistKmPointToLatLngPath(latP, lonP, latlngs) {
            if (!latlngs || latlngs.length < 2) return Infinity;
            let minD = Infinity;
            for (let i = 0; i < latlngs.length - 1; i++) {
                const a = latlngs[i];
                const b = latlngs[i + 1];
                const la1 = a.lat != null ? a.lat : a[0];
                const lo1 = a.lng != null ? a.lng : a[1];
                const la2 = b.lat != null ? b.lat : b[0];
                const lo2 = b.lng != null ? b.lng : b[1];
                const d = minDistKmPointToGreatCircleSampled(latP, lonP, la1, lo1, la2, lo2, 14);
                if (d < minD) minD = d;
            }
            return minD;
        }

        function ferryLatLngsForTrip(trip) {
            const arr = trip.ferryReverse
                ? [...FERRY_KIEL_KLAIPEDA].reverse()
                : FERRY_KIEL_KLAIPEDA;
            return arr.map(([lat, lon]) => L.latLng(lat, lon));
        }

        function pathForTripAndDriveResult(trip, latlngsMaybe) {
            if (trip.type === 'ferry') return ferryLatLngsForTrip(trip);
            if (latlngsMaybe && latlngsMaybe.length >= 2) return latlngsMaybe;
            if (trip.type === 'drive') {
                return [L.latLng(trip.lat1, trip.lon1), L.latLng(trip.lat2, trip.lon2)];
            }
            return null;
        }

        function minDistPlaceToChosenPaths(lat, lon, chosen, driveLegs, driveResults) {
            let minD = Infinity;
            chosen.forEach(trip => {
                let latlngs = null;
                if (trip.type === 'ferry') latlngs = pathForTripAndDriveResult(trip, null);
                else {
                    const di = driveLegs.findIndex(d => d.id === trip.id);
                    latlngs = pathForTripAndDriveResult(
                        trip,
                        di >= 0 ? driveResults[di] : null
                    );
                }
                const nearEnd = Math.min(
                    haversineKm(lat, lon, trip.lat1, trip.lon1),
                    haversineKm(lat, lon, trip.lat2, trip.lon2)
                );
                let pathD = Infinity;
                if (latlngs && latlngs.length >= 2) {
                    pathD = minDistKmPointToLatLngPath(lat, lon, latlngs);
                }
                const legMin = Math.min(pathD, nearEnd);
                if (legMin < minD) minD = legMin;
            });
            return minD;
        }

        function truncateForPopup(s, maxLen) {
            const t = s == null ? '' : String(s).trim();
            if (!t) return '';
            if (t.length <= maxLen) return t;
            return `${t.slice(0, maxLen - 1).trim()}…`;
        }

        function isGoogleMapsPlaceListingUrl(url) {
            if (!url || typeof url !== 'string') return false;
            return /\/maps\/place\//i.test(url) && isGoogleMapsUrl(url);
        }

        function savedPlacePopupHtml(props, coords) {
            const p = props || {};
            const loc = p.location || {};
            const name = loc.name || 'Saved place';
            let desc = (loc.address || p.Comment || '').trim();
            desc = truncateForPopup(desc, 260);

            const descBlock = desc
                ? `<div class="trip-endpoint-meta" style="margin-top:4px">${escapeHtml(desc)}</div>`
                : '';

            let mapsHref = '';
            const gRaw = p.google_maps_url;
            if (gRaw && isGoogleMapsPlaceListingUrl(gRaw)) {
                mapsHref = googleMapsUrlToHttps(gRaw);
            } else if (coords && Number.isFinite(coords.lat) && Number.isFinite(coords.lon)) {
                mapsHref = mapsHrefForCoords(coords.lat, coords.lon);
            } else if (gRaw) {
                mapsHref = googleMapsUrlToHttps(gRaw);
            }
            const mapsBlock = mapsHref
                ? `<div class="trip-endpoint-actions"><a class="trip-endpoint-maps" href="${escapeHref(mapsHref)}" target="_blank" rel="noopener noreferrer">Open in Google Maps</a></div>`
                : '';

            return `<div class="trip-endpoint-popup-card">
                <div class="trip-endpoint-k">★ Saved place</div>
                <div class="trip-endpoint-place">${escapeHtml(name)}</div>
                ${descBlock}
                ${mapsBlock}
            </div>`;
        }

        /** Hide ★ markers that sit on a selected leg’s departure or arrival (trip endpoints take precedence). */
        function savedPlaceOverlapsSelectedTripEndpoint(lat, lon, chosenTrips) {
            const threshKm = 0.09;
            for (const t of chosenTrips) {
                if (haversineKm(lat, lon, t.lat1, t.lon1) < threshKm) return true;
                if (haversineKm(lat, lon, t.lat2, t.lon2) < threshKm) return true;
            }
            return false;
        }

        function savedPlaceTooltipHtml(props) {
            const p = props || {};
            const loc = p.location || {};
            const name = loc.name || 'Saved place';
            const addr = (loc.address || p.Comment || '').trim();
            const addrLine = addr
                ? `<div class="star-tip-addr">${escapeHtml(addr.length > 80 ? addr.slice(0, 78) + '…' : addr)}</div>`
                : '';
            return `<div class="star-tip-inner"><span class="star-tip-icon">★</span><div><div class="star-tip-name">${escapeHtml(name)}</div>${addrLine}</div></div>`;
        }

        function addSavedPlacesNearChosenRoutes(gen, chosen, driveLegs, driveResults) {
            if (gen !== mapSyncGen) return;
            if (!savedPlacesGeojsonFeatures.length || !chosen.length) return;
            const seen = new Set();
            for (const f of savedPlacesGeojsonFeatures) {
                const pt = coordsFromSavedPlaceFeature(f);
                if (!pt) continue;
                if (savedPlaceOverlapsSelectedTripEndpoint(pt.lat, pt.lon, chosen)) continue;
                const dKm = minDistPlaceToChosenPaths(pt.lat, pt.lon, chosen, driveLegs, driveResults);
                if (dKm > SAVED_PLACE_CORRIDOR_KM) continue;
                const key = `${pt.lat.toFixed(4)},${pt.lon.toFixed(4)}`;
                if (seen.has(key)) continue;
                seen.add(key);
                const props = f.properties || {};
                const tipHtml = savedPlaceTooltipHtml(props);
                const popupHtml = savedPlacePopupHtml(props, pt);
                const m = L.marker([pt.lat, pt.lon], {
                    icon: savedStarDivIcon,
                    zIndexOffset: 800
                })
                    .addTo(map)
                    .bindTooltip(tipHtml, {
                        direction: 'top',
                        sticky: false,
                        opacity: 1,
                        className: 'star-tip'
                    })
                    .bindPopup(popupHtml, savedPlacePopupOptions);
                m.on('popupopen', function () { m.closeTooltip(); });
                m._isSavedStar = true;
                legMarkers.push(m);
            }
        }

        async function fetchDriveLegRoute(trip, signal) {
            if (driveLegRouteCache.has(trip.id)) return driveLegRouteCache.get(trip.id);
            const out = await fetchDrivingRouteForEndpoints(
                trip.lat1,
                trip.lon1,
                trip.lat2,
                trip.lon2,
                signal
            );
            if (out && out.latlngs && out.latlngs.length >= 2) {
                driveLegRouteCache.set(trip.id, out);
            }
            return out;
        }

        async function fetchDriveLegLatLngs(trip, signal) {
            const route = await fetchDriveLegRoute(trip, signal);
            if (route) applyDirectionsRouteMetrics(trip, route);
            return route ? route.latlngs : null;
        }

        /** Extra stroke width on the white underlay so coloured routes stay readable over OSM roads when zoomed in. */
        const ROUTE_HALO_EXTRA_PX = 6;

        /** Soft map stroke when exactly one drive leg is selected (replaces the dark mono tone). */
        const SOFT_SINGLE_DRIVE_MAP_COLOR = '#95a8d4';

        /** Softer sea blue when exactly one ferry leg is selected. */
        const SOFT_SINGLE_FERRY_MAP_COLOR = '#7ec8ea';

        /**
         * Distinct pastel hue per leg id (golden-angle spacing). Lower saturation / higher lightness
         * so multi-select lines sit closer to the soft single-leg palette while staying distinguishable.
         */
        function distinctMapColorForTripId(id) {
            const n = Number(id);
            if (!Number.isFinite(n) || n <= 0) return 'hsl(252, 42%, 70%)';
            const hue = ((n * 137.508) % 360 + 360) % 360;
            return `hsl(${hue}, 46%, 70%)`;
        }

        function lineColorForTrip(trip, selectionCount) {
            if (selectionCount >= 2) return distinctMapColorForTripId(trip.id);
            if (trip.type === 'ferry') return SOFT_SINGLE_FERRY_MAP_COLOR;
            return SOFT_SINGLE_DRIVE_MAP_COLOR;
        }

        function addRouteLineStack(latlngs, lineColor, opts, tripId) {
            const color = lineColor;
            const mainW = opts.mainWeight;
            const haloW = mainW + ROUTE_HALO_EXTRA_PX;
            const halo = L.polyline(latlngs, {
                color: '#ffffff',
                weight: haloW,
                opacity: opts.haloOpacity ?? 0.92,
                lineJoin: 'round',
                smoothFactor: opts.smoothFactor ?? 1,
                dashArray: opts.dashArray,
                interactive: false,
                pane: 'overlayPane'
            }).addTo(map);
            halo._routeTripId = tripId;
            rememberLayerBaseline(halo);
            legMarkers.push(halo);
            const line = L.polyline(latlngs, {
                color,
                weight: mainW,
                opacity: opts.mainOpacity ?? 0.96,
                lineJoin: 'round',
                smoothFactor: opts.smoothFactor ?? 1,
                dashArray: opts.dashArray,
                interactive: true,
                bubblingMouseEvents: false,
                pane: 'overlayPane'
            }).addTo(map);
            line._routeTripId = tripId;
            rememberLayerBaseline(line);
            if (line._legRouteClickHandler) line.off('click', line._legRouteClickHandler);
            line._legRouteClickHandler = function (ev) {
                handleRoutePolylineClick(tripId, ev);
            };
            line.on('click', line._legRouteClickHandler);
            legMarkers.push(line);
        }

        function addFerryLineToMap(trip, selectionCount) {
            const base = FERRY_KIEL_KLAIPEDA.map(([lat, lon]) => L.latLng(lat, lon));
            const latlngs = trip.ferryReverse ? base.reverse() : base;
            const c = lineColorForTrip(trip, selectionCount);
            addRouteLineStack(latlngs, c, { mainWeight: 6, smoothFactor: 1, haloOpacity: 0.9, mainOpacity: 0.95 }, trip.id);
        }

        function addDrivePolylineToMap(trip, latlngs, selectionCount) {
            const c = lineColorForTrip(trip, selectionCount);
            if (latlngs && latlngs.length) {
                addRouteLineStack(latlngs, c, { mainWeight: 6, mainOpacity: 0.96, haloOpacity: 0.93 }, trip.id);
            } else {
                const chord = [[trip.lat1, trip.lon1], [trip.lat2, trip.lon2]];
                addRouteLineStack(
                    chord,
                    c,
                    {
                        mainWeight: 5,
                        mainOpacity: 0.94,
                        haloOpacity: 0.9,
                        dashArray: '8 11'
                    },
                    trip.id
                );
            }
        }

        function endpointClusterKey(lat, lon) {
            return `${Number(lat).toFixed(ENDPOINT_CLUSTER_DECIMALS)},${Number(lon).toFixed(ENDPOINT_CLUSTER_DECIMALS)}`;
        }

        function buildEndpointClustersFromTrips(trips) {
            const m = new Map();
            for (const trip of trips) {
                const pairs = [
                    { role: 'start', lat: trip.lat1, lon: trip.lon1 },
                    { role: 'end', lat: trip.lat2, lon: trip.lon2 }
                ];
                for (const { role, lat, lon } of pairs) {
                    const key = endpointClusterKey(lat, lon);
                    if (!m.has(key)) m.set(key, { lat, lon, stops: [] });
                    m.get(key).stops.push({ trip, role });
                }
            }
            return m;
        }

        function endpointClusterFillColor(stops, selectionCount) {
            if (!stops || !stops.length) return '#9aa8c7';
            if (stops.length === 1) return lineColorForTrip(stops[0].trip, selectionCount);
            const ids = new Set(stops.map(s => s.trip.id));
            if (ids.size === 1) return lineColorForTrip(stops[0].trip, selectionCount);
            return '#9aa8c7';
        }

        /** Tooltip order: calendar order; same day shows arrival then departure at a hub. */
        function endpointStopsSortForTooltip(a, b) {
            const da = parseTripListDate(a.trip.date);
            const db = parseTripListDate(b.trip.date);
            const ta = da ? da.getTime() : Number.MAX_SAFE_INTEGER;
            const tb = db ? db.getTime() : Number.MAX_SAFE_INTEGER;
            if (ta !== tb) return ta - tb;
            if (a.role !== b.role) return a.role === 'end' ? -1 : 1;
            return a.trip.id - b.trip.id;
        }

        function endpointClusterTooltipHtml(stops) {
            const sorted = [...stops].sort(endpointStopsSortForTooltip);

            // Check if every stop resolves to the same place name so we can de-dupe.
            const allPlaces = sorted.map(s => (s.role === 'start' ? s.trip.from : s.trip.to) || '');
            const sharedPlace = allPlaces.every(p => p === allPlaces[0]) && allPlaces[0] ? allPlaces[0] : null;

            const placeHeader = sharedPlace
                ? `<div class="trip-endpoint-tip-place">${escapeHtml(sharedPlace)}</div>`
                : '';

            const blocks = sorted.map(s => {
                const trip = s.trip;
                const isDep = s.role === 'start';
                const place = isDep ? trip.from : trip.to;
                const label = isDep ? 'Departure' : 'Arrival';
                const pillClass = isDep ? 'trip-endpoint-tip-pill--dep' : 'trip-endpoint-tip-pill--arr';
                const dateRaw = trip.date ? String(trip.date).trim() : '';
                const dateHtml = dateRaw
                    ? `<span class="trip-endpoint-tip-date">${escapeHtml(dateRaw)}</span>`
                    : `<span class="trip-endpoint-tip-date trip-endpoint-tip-date--muted">No date</span>`;
                // Show context: for departure show where you're heading, for arrival show where you came from.
                const ctx = isDep
                    ? trip.to
                        ? `<div class="trip-endpoint-tip-ctx">→ ${escapeHtml(trip.to)}</div>`
                        : ''
                    : trip.from
                      ? `<div class="trip-endpoint-tip-ctx">← ${escapeHtml(trip.from)}</div>`
                      : '';
                // Only show the place name per-row when places differ across stops.
                const placeLine = sharedPlace
                    ? ''
                    : `<div class="trip-endpoint-tip-place">${escapeHtml(place)}</div>`;
                return `<div class="trip-endpoint-tip-row">
                    <div class="trip-endpoint-tip-head">
                        <span class="trip-endpoint-tip-pill ${pillClass}">${escapeHtml(label)}</span>
                        ${dateHtml}
                    </div>
                    ${placeLine}
                    ${ctx}
                </div>`;
            });
            return `<div class="trip-endpoint-tip-inner">${placeHeader}${blocks.join('')}</div>`;
        }

        function mapsSearchHrefForPlace(place) {
            const q = String(place || '').trim();
            if (!q) return '';
            return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(q)}`;
        }

        /** Canonical Google “place” listing (optional on a trip). Not derivable from lat/lon alone — needs Google’s place id / data blob. */
        function tripGoogleMapsListingHref(trip, role) {
            if (!trip) return '';
            const raw = role === 'end' ? trip.googleMapsPlaceUrl : trip.googleMapsPlaceUrlStart;
            if (!raw || typeof raw !== 'string') return '';
            if (!isGoogleMapsUrl(raw)) return '';
            return googleMapsUrlToHttps(raw);
        }

        /** Opens Google Maps at exact coordinates when no canonical place URL is stored. */
        function mapsHrefForCoords(lat, lon) {
            if (lat == null || lon == null) return '';
            if (!Number.isFinite(Number(lat)) || !Number.isFinite(Number(lon))) return '';
            return `https://www.google.com/maps?q=${lat},${lon}`;
        }

        function mapsHrefForTripRole(trip, role) {
            const placeListing = tripGoogleMapsListingHref(trip, role);
            if (placeListing) return placeListing;
            const isEnd = role === 'end';
            const lat = isEnd ? trip.lat2 : trip.lat1;
            const lon = isEnd ? trip.lon2 : trip.lon1;
            return mapsHrefForCoords(lat, lon) || mapsSearchHrefForPlace(isEnd ? (trip.stayAddress || trip.to) : trip.from);
        }

        function legCornerBookingLinkHtml(trip) {
            if (!trip.stayUrl || isGoogleMapsUrl(trip.stayUrl)) return '';
            const title = escapeHtml(stayLineForDisplay(trip) || trip.accommodation || 'Open booking link');
            return `<a class="leg-corner-link leg-corner-link--booking" href="${escapeHref(trip.stayUrl)}" target="_blank" rel="noopener noreferrer" title="${title}" aria-label="${title}">${LINK_ICON_SVG}</a>`;
        }

        /** Destination-only: stacked under the booking icon when both exist. */
        function legCornerDestinationMapLinkHtml(trip) {
            const he = mapsHrefForTripRole(trip, 'end');
            if (!he) return '';
            const tl = `Google Maps · destination: ${trip.to || 'End'}`;
            return `<a class="leg-corner-link leg-corner-link--maps" href="${escapeHref(he)}" target="_blank" rel="noopener noreferrer" title="${escapeHtml(tl)}" aria-label="${escapeHtml(tl)}">${MAP_PIN_ICON_SVG}</a>`;
        }

        function legCornerActionsBlock(trip) {
            const booking = legCornerBookingLinkHtml(trip);
            const mapDest = legCornerDestinationMapLinkHtml(trip);
            if (!booking && !mapDest) return '';
            return `<div class="leg-corner-actions">${booking}${mapDest}</div>`;
        }

        function endpointPopupSection(trip, role) {
            const place = role === 'start' ? trip.from : trip.to;
            const label = role === 'start' ? 'Departure' : 'Arrival';
            const mode = trip.type === 'ferry' ? 'Ferry' : 'Drive';
            const km = displayKmForTrip(trip);
            const timeStr = escapeHtml(displayTimeForTrip(trip));
            const dateStr = trip.date ? escapeHtml(String(trip.date).trim()) : '';
            // Show accommodation name as a note when it's meaningfully different from the place label
            const accName = (trip.accommodation && String(trip.accommodation).trim()) || '';
            const stay = (role === 'end' && accName && accName !== place)
                ? `<div class="trip-endpoint-note">${escapeHtml(accName)}</div>`
                : '';
            const href = mapsHrefForTripRole(trip, role);
            const maps = href
                ? `<div class="trip-endpoint-actions"><a class="trip-endpoint-maps" href="${escapeHref(href)}" target="_blank" rel="noopener noreferrer">Open in Google Maps</a></div>`
                : '';
            const bookingLink = (role === 'end' && trip.stayUrl && !isGoogleMapsUrl(trip.stayUrl))
                ? `<div class="trip-endpoint-actions" style="margin-top:6px"><a class="trip-endpoint-maps" href="${escapeHref(trip.stayUrl)}" target="_blank" rel="noopener noreferrer">Open stay / booking link</a></div>`
                : '';
            return `<div class="trip-endpoint-block">
                <div class="trip-endpoint-k">${escapeHtml(label)}${dateStr ? ` · ${dateStr}` : ''}</div>
                <div class="trip-endpoint-place">${escapeHtml(place)}</div>
                <div class="trip-endpoint-meta">${escapeHtml(trip.from)} → ${escapeHtml(trip.to)} · ${km} km · ${timeStr} · ${escapeHtml(mode)}</div>
                ${stay}
                ${maps}
                ${bookingLink}
            </div>`;
        }

        /**
         * Builds popup HTML for a cluster of stops.
         * When all stops share the same place name (hub scenario), the location is shown once
         * and each row shows only the role, date, and the other end of the journey.
         * When places differ, falls back to one full section per stop.
         */
        function endpointClusterPopupHtml(stops) {
            const sorted = [...stops].sort(endpointStopsSortForTooltip);

            const allPlaces = sorted.map(s => (s.role === 'start' ? s.trip.from : s.trip.to) || '');
            const sharedPlace = allPlaces.length > 1 && allPlaces.every(p => p === allPlaces[0]) && allPlaces[0]
                ? allPlaces[0]
                : null;

            if (!sharedPlace) {
                const parts = sorted.map(s => endpointPopupSection(s.trip, s.role));
                return `<div class="trip-endpoint-popup-card">${parts.join('<hr class="trip-endpoint-hr" />')}</div>`;
            }

            // Deduped hub layout: shared place shown once, each stop shows only its unique info.
            // Use coordinates from any arrival stop for the Maps link
            const arrStop = sorted.find(s => s.role === 'end');
            const mapsHref = arrStop
                ? mapsHrefForTripRole(arrStop.trip, 'end')
                : mapsSearchHrefForPlace(sharedPlace);
            const mapsLink = mapsHref
                ? `<div class="trip-endpoint-actions" style="margin-bottom:6px"><a class="trip-endpoint-maps" href="${escapeHref(mapsHref)}" target="_blank" rel="noopener noreferrer">Open in Google Maps</a></div>`
                : '';
            const sharedStayUrl = sorted
                .filter(s => s.role === 'end' && s.trip.stayUrl && !isGoogleMapsUrl(s.trip.stayUrl))
                .map(s => s.trip.stayUrl)[0] || null;
            const hubBookingLink = sharedStayUrl
                ? `<div class="trip-endpoint-actions" style="margin-bottom:6px"><a class="trip-endpoint-maps" href="${escapeHref(sharedStayUrl)}" target="_blank" rel="noopener noreferrer">Open stay / booking link</a></div>`
                : '';

            const rows = sorted.map(s => {
                const trip = s.trip;
                const isDep = s.role === 'start';
                const pillClass = isDep ? 'ep-pill--dep' : 'ep-pill--arr';
                const label = isDep ? 'Departure' : 'Arrival';
                const dateStr = trip.date ? escapeHtml(String(trip.date).trim()) : '';
                const mode = trip.type === 'ferry' ? 'Ferry' : 'Drive';
                const km = displayKmForTrip(trip);
                const timeStr = escapeHtml(displayTimeForTrip(trip));
                const otherEnd = isDep ? trip.to : trip.from;
                const arrow = isDep ? '→' : '←';
                const meta = `${km} km · ${timeStr} · ${escapeHtml(mode)}`;
                // For departure: show stay address at the destination if available.
                const stayLine = isDep ? stayLineForDisplay(trip) : '';
                const stayHtml = stayLine ? `<div class="trip-endpoint-note ep-hub-meta" style="margin-top:2px">${escapeHtml(stayLine)}</div>` : '';
                return `<div class="ep-hub-row">
                    <div class="ep-hub-row-head">
                        <span class="ep-pill ${pillClass}">${escapeHtml(label)}</span>
                        ${dateStr ? `<span class="ep-hub-date">${dateStr}</span>` : ''}
                    </div>
                    <div class="ep-hub-dir">${arrow} ${escapeHtml(otherEnd || '—')}</div>
                    <div class="ep-hub-meta">${meta}</div>
                    ${stayHtml}
                </div>`;
            });

            return `<div class="trip-endpoint-popup-card">
                <div class="ep-hub-place">${escapeHtml(sharedPlace)}</div>
                ${mapsLink}
                ${hubBookingLink}
                ${rows.join('')}
            </div>`;
        }

        /** Keep leg endpoints above route polylines (overlayPane) and other markerPane layers. */
        function bringEndpointCircleMarkersToFront() {
            legMarkers.forEach(layer => {
                if (layer && layer instanceof L.CircleMarker && typeof layer.bringToFront === 'function') {
                    layer.bringToFront();
                }
            });
        }

        function addEndpointMarkersForTrips(trips, selectionCount) {
            const clusters = buildEndpointClustersFromTrips(trips);
            for (const { lat, lon, stops } of clusters.values()) {
                stops.sort((a, b) => {
                    const d = a.trip.id - b.trip.id;
                    if (d !== 0) return d;
                    if (a.role === b.role) return 0;
                    return a.role === 'start' ? -1 : 1;
                });
                const fillColor = endpointClusterFillColor(stops, selectionCount);
                const tipHtml = endpointClusterTooltipHtml(stops);
                const popupHtml = endpointClusterPopupHtml(stops);
                const mkOpts = {
                    pane: 'markerPane',
                    radius: 8,
                    fillColor,
                    color: '#ffffff',
                    weight: 3,
                    opacity: 1,
                    fillOpacity: 0.98,
                    bubblingMouseEvents: false,
                    interactive: true,
                    zIndexOffset: 1000
                };
                const m = L.circleMarker([lat, lon], mkOpts)
                    .addTo(map)
                    .bindTooltip(tipHtml, {
                        sticky: true,
                        direction: 'auto',
                        opacity: 1,
                        className: 'trip-endpoint-tip',
                        interactive: false
                    })
                    .bindPopup(popupHtml, tripEndpointPopupOptions);
                // Hide tooltip while popup is open; Leaflet re-shows it naturally on next hover.
                m.on('popupopen', function () { m.closeTooltip(); });
                m._endpointTripIds = [...new Set(stops.map(s => s.trip.id))];
                legMarkers.push(m);
            }
            bringEndpointCircleMarkersToFront();
        }

        /** Bounds for current map selection (endpoints + full ferry track when a ferry leg is selected). */
        function boundsForTripsSelection(chosen) {
            if (!chosen || !chosen.length) return null;
            let b = null;
            for (const t of chosen) {
                for (const [la, lo] of [
                    [t.lat1, t.lon1],
                    [t.lat2, t.lon2]
                ]) {
                    const pt = L.latLng(la, lo);
                    b = b ? b.extend(pt) : L.latLngBounds(pt, pt);
                }
                if (t.type === 'ferry') {
                    const track = t.ferryReverse ? [...FERRY_KIEL_KLAIPEDA].reverse() : FERRY_KIEL_KLAIPEDA;
                    for (const [la, lo] of track) b.extend(L.latLng(la, lo));
                }
            }
            return b && b.isValid() ? b : null;
        }

        function fitMapToRoughSelection(chosen) {
            const b = boundsForTripsSelection(chosen);
            if (!b) return;
            const one = chosen.length === 1;
            map.fitBounds(b.pad(one ? 0.14 : 0.08), {
                padding: [44, 44],
                maxZoom: one ? 12 : undefined,
                animate: false
            });
        }

        async function syncMapToSelection() {
            mapSyncGen++;
            const gen = mapSyncGen;
            if (mapSyncAbort) mapSyncAbort.abort();
            mapSyncAbort = new AbortController();
            const signal = mapSyncAbort.signal;

            clearDynamicMapLayers();
            resetMapRouteFocusState();

            const chosen = trips.filter(t => selectedIds.has(t.id));
            if (chosen.length === 0) {
                map.fitBounds(tripExtentBounds.pad(0.03), { padding: [52, 52], animate: false });
                return;
            }

            fitMapToRoughSelection(chosen);

            const drawOrder = chosenTripsForMapDrawOrder(chosen);
            const driveLegs = drawOrder.filter(t => t.type !== 'ferry');

            try {
                const driveResults = await Promise.all(
                    driveLegs.map(t =>
                        fetchDriveLegLatLngs(t, signal).catch(() => null)
                    )
                );
                if (gen !== mapSyncGen) return;

                const nSel = chosen.length;
                const driveIdx = new Map(driveLegs.map((t, i) => [t.id, i]));
                for (const t of drawOrder) {
                    if (t.type === 'ferry') addFerryLineToMap(t, nSel);
                    else addDrivePolylineToMap(t, driveResults[driveIdx.get(t.id)], nSel);
                }
                addEndpointMarkersForTrips(chosen, nSel);
                addSavedPlacesNearChosenRoutes(gen, chosen, driveLegs, driveResults);
                bringEndpointCircleMarkersToFront();
                applyMapRouteFocusStyles();

                if (gen !== mapSyncGen) return;

                const layersWithBounds = legMarkers.filter(
                    ly => ly.getBounds && ly.getBounds().isValid()
                );
                if (layersWithBounds.length) {
                    let b = layersWithBounds[0].getBounds();
                    for (let i = 1; i < layersWithBounds.length; i++) {
                        b = b.extend(layersWithBounds[i].getBounds());
                    }
                    map.fitBounds(b.pad(chosen.length === 1 ? 0.1 : 0.02), {
                        padding: [48, 48],
                        maxZoom: chosen.length === 1 ? 13 : undefined,
                        animate: false
                    });
                } else {
                    fitMapToRoughSelection(chosen);
                }
            } catch (e) {
                if (e.name !== 'AbortError') console.warn(e);
            }
        }

        const legsList = document.getElementById('legsList');
        const legsScroll = legsList.parentElement;

        function geoErrorMessage(err) {
            const code = err && err.code;
            if (code === 1) {
                return 'Location blocked. Android/Brave: tap the lock or site icon → Permissions → Location → Allow. In Brave, open the lion menu and allow location or lower Shields for this site. Use https:// (opening the file from Downloads often skips the prompt).';
            }
            if (code === 2) return 'Position unavailable.';
            if (code === 3) return 'Location request timed out.';
            return 'Could not read your location.';
        }

        async function runEtaFromHereAfterPosition(pos, trip, btn, signal) {
            if (signal.aborted) {
                btn.disabled = false;
                return;
            }
            if (selectedIds.size !== 1 || tripById([...selectedIds][0]) !== trip) {
                btn.disabled = false;
                return;
            }

            const uLat = pos.coords.latitude;
            const uLon = pos.coords.longitude;

            try {
                if (signal.aborted) return;
                try {
                    if (trip.type === 'ferry') {
                        const r = await estimateFerryLegEtaFromUser(uLon, uLat, trip, signal);
                        if (signal.aborted) return;
                        if (!r) trip._etaFromHereErr = 'No driving route to departure port';
                        else {
                            trip._etaFromHereSec = r.durationSec;
                            trip._etaFromHereKm = r.distanceKm;
                            trip._etaFromHereRoadKm = r.roadKm;
                            trip._etaFromHereSeaKm = r.seaKm;
                            trip._etaFromHereFerryKmh = r.ferryKmh;
                        }
                    } else {
                        const r = await fetchDrivingUserToTripEnd(uLon, uLat, trip, signal);
                        if (signal.aborted) return;
                        if (!r) trip._etaFromHereErr = 'No driving route';
                        else {
                            trip._etaFromHereSec = r.durationSec;
                            trip._etaFromHereKm = r.distanceKm;
                        }
                    }
                } catch (e) {
                    if (e && e.name === 'AbortError') return;
                    trip._etaFromHereErr = 'Route lookup failed';
                }
                refreshLegEtaRow(trip);
            } finally {
                btn.disabled = false;
            }
        }

        /**
         * Must call geolocation synchronously from the tap handler (no await before it),
         * or iOS Safari may report permission denied even when the user would allow access.
         */
        function runEtaFromHere() {
            const btn = document.getElementById('etaFromHereBtn');
            if (!btn || !isEtaFromLocationAvailable()) return;

            if (selectedIds.size !== 1) {
                syncEtaFromHereUi();
                return;
            }
            const trip = tripById([...selectedIds][0]);
            if (!trip || (trip.type !== 'drive' && trip.type !== 'ferry')) {
                syncEtaFromHereUi();
                return;
            }

            if (!('geolocation' in navigator)) {
                clearFromHereEtaTripFields();
                trip._etaFromHereErr = 'This browser does not support location.';
                refreshAllLegEtaRows();
                return;
            }
            if (!window.isSecureContext) {
                clearFromHereEtaTripFields();
                trip._etaFromHereErr = 'Open this page over HTTPS (or localhost) to use location.';
                refreshAllLegEtaRows();
                return;
            }

            if (etaFromHereAbort) etaFromHereAbort.abort();
            etaFromHereAbort = new AbortController();
            const signal = etaFromHereAbort.signal;

            clearFromHereEtaTripFields();
            refreshAllLegEtaRows();
            btn.disabled = true;

            const optsLo = { enableHighAccuracy: false, maximumAge: Infinity, timeout: 15000 };
            const optsHi = { enableHighAccuracy: true, maximumAge: Infinity, timeout: 26000 };

            function onGeoFail(err) {
                btn.disabled = false;
                if (signal.aborted) return;
                trip._etaFromHereErr = geoErrorMessage(err);
                refreshLegEtaRow(trip);
            }

            function onGeoOk(pos) {
                if (signal.aborted) {
                    btn.disabled = false;
                    return;
                }
                void runEtaFromHereAfterPosition(pos, trip, btn, signal);
            }

            navigator.geolocation.getCurrentPosition(
                onGeoOk,
                err => {
                    if (signal.aborted) {
                        btn.disabled = false;
                        return;
                    }
                    if (err && err.code === 1) {
                        onGeoFail(err);
                        return;
                    }
                    navigator.geolocation.getCurrentPosition(onGeoOk, onGeoFail, optsHi);
                },
                optsLo
            );
        }

        function wireLegSelectionButtons(allId, noneId) {
            const allBtn = document.getElementById(allId);
            const noneBtn = document.getElementById(noneId);
            if (allBtn) {
                allBtn.addEventListener('click', () => setSelection(new Set(trips.map(t => t.id))));
            }
            if (noneBtn) {
                noneBtn.addEventListener('click', () => setSelection(new Set()));
            }
        }
        wireLegSelectionButtons('legsSelectAll', 'legsSelectNone');
        document.getElementById('etaFromHereBtn')?.addEventListener('click', () => {
            runEtaFromHere();
        });

        map.on('click', function (e) {
            if (e && e.originalEvent && e.originalEvent._legRouteHandled) return;
            resetMapRouteFocusState();
        });

        map.on('popupclose', function (e) {
            if (mapRouteFocusPopup && e.popup === mapRouteFocusPopup) {
                resetMapRouteFocusState();
            }
        });

        const marquee = document.createElement('div');
        marquee.className = 'legs-marquee';
        legsScroll.appendChild(marquee);

        let dragPointerDown = false;
        let dragAnchorIndex = -1;
        let dragLastIndex = -1;
        let dragMeta = false;
        let dragSuppressClick = false;
        let blockNextLegClicks = 0;

        function legIndexFromClientY(clientY) {
            const items = legsList.querySelectorAll('.leg-item');
            for (let i = 0; i < items.length; i++) {
                const r = items[i].getBoundingClientRect();
                if (clientY >= r.top && clientY <= r.bottom) return i;
            }
            return dragLastIndex >= 0 ? dragLastIndex : dragAnchorIndex;
        }

        function updateMarqueeVisual() {
            const items = legsList.querySelectorAll('.leg-item');
            if (!items.length || dragAnchorIndex < 0 || dragLastIndex < 0) {
                marquee.style.display = 'none';
                return;
            }
            const lo = Math.min(dragAnchorIndex, dragLastIndex);
            const hi = Math.max(dragAnchorIndex, dragLastIndex);
            const topEl = items[lo];
            const botEl = items[hi];
            const sr = legsScroll.getBoundingClientRect();
            const top = topEl.getBoundingClientRect().top;
            const bot = botEl.getBoundingClientRect().bottom;
            const padTop = top - sr.top + legsScroll.scrollTop;
            const padH = Math.max(bot - top, 4);
            marquee.style.display = 'block';
            marquee.style.top = `${padTop}px`;
            marquee.style.height = `${padH}px`;
        }

        function previewRangeSelection(lo, hi) {
            const items = legsList.querySelectorAll('.leg-item');
            for (let i = 0; i < items.length; i++) {
                setRowVisual(items[i], i >= lo && i <= hi);
            }
        }

        function commitRangeSelection(lo, hi, union) {
            const rangeIds = new Set();
            for (let i = lo; i <= hi; i++) {
                rangeIds.add(trips[i].id);
            }
            setSelection(rangeIds, { union });
        }

        function handleDragMove(clientY) {
            if (!dragPointerDown) return;
            dragLastIndex = legIndexFromClientY(clientY);
            if (dragLastIndex < 0) dragLastIndex = dragAnchorIndex;
            const lo = Math.min(dragAnchorIndex, dragLastIndex);
            const hi = Math.max(dragAnchorIndex, dragLastIndex);
            if (lo !== hi) {
                dragSuppressClick = true;
                legsScroll.classList.add('is-dragging');
            }
            previewRangeSelection(lo, hi);
            updateMarqueeVisual();
        }

        function handleDragEnd() {
            if (!dragPointerDown) return;
            dragPointerDown = false;
            legsScroll.classList.remove('is-dragging');
            marquee.style.display = 'none';
            const lo = Math.min(dragAnchorIndex, dragLastIndex);
            const hi = Math.max(dragAnchorIndex, dragLastIndex);
            if (dragSuppressClick && lo !== hi) {
                commitRangeSelection(lo, hi, dragMeta);
                blockNextLegClicks = 1;
            } else {
                applySelectionToDom();
            }
            dragSuppressClick = false;
            dragAnchorIndex = -1;
            dragLastIndex = -1;
        }

        document.addEventListener('mousemove', ev => handleDragMove(ev.clientY));
        document.addEventListener('mouseup', handleDragEnd);
        document.addEventListener('touchmove', ev => {
            if (!dragPointerDown) return;
            ev.preventDefault();
            handleDragMove(ev.touches[0].clientY);
        }, { passive: false });
        document.addEventListener('touchend', handleDragEnd);
        document.addEventListener('touchcancel', handleDragEnd);

        trips.forEach((trip, tripIndex) => {
            const legDiv = document.createElement('div');
            legDiv.className = 'leg-item';
            legDiv.dataset.legId = trip.id;
            legDiv.dataset.legIndex = String(tripIndex);
            legDiv.title = `${trip.from} → ${trip.to}`;
            const nextTrip = trips[tripIndex + 1] || null;
            const ferryTag = trip.type === 'ferry' ? '<span class="leg-mini-ferry" title="Ferry crossing">SEA</span>' : '';
            legDiv.innerHTML = `
                <input type="checkbox" class="leg-cb"${selectedIds.has(trip.id) ? ' checked' : ''} />
                ${legDateColumnHtml(trip, nextTrip)}
                <div class="leg-main">
                    <div class="leg-line1">${escapeHtml(trip.from)} → ${escapeHtml(trip.to)} ${ferryTag}</div>
                    <div class="leg-line2"><span class="leg-line2-meta">${displayKmForTrip(trip)} km · ${escapeHtml(displayTimeForTrip(trip))} · ${trip.type === 'ferry' ? 'ferry' : 'drive'}</span></div>
                    <div class="leg-line-eta" aria-live="polite"></div>
                    ${stayTextBlock(trip)}
                    ${legCornerActionsBlock(trip)}
                </div>`;
            applyLegTimelineClasses(legDiv, trip);

            const cb = legDiv.querySelector('.leg-cb');
            cb.setAttribute('aria-label', `Show or hide on map: ${trip.from} to ${trip.to}`);
            cb.addEventListener('change', ev => {
                ev.stopPropagation();
                if (cb.checked) selectedIds.add(trip.id);
                else selectedIds.delete(trip.id);
                applySelectionToDom();
                invalidateFromHereEta();
                syncMapToSelection();
            });

            legDiv.addEventListener('pointerdown', ev => {
                /** Range marquee + document touchmove preventDefault() breaks list scroll on phones — mouse/pen only. */
                if (ev.pointerType === 'touch') return;
                if (ev.pointerType === 'mouse' && ev.button !== 0) return;
                if (ev.target.closest && ev.target.closest('.leg-corner-link')) return;
                if (ev.target.classList.contains('leg-cb')) return;
                dragPointerDown = true;
                dragSuppressClick = false;
                dragAnchorIndex = tripIndex;
                dragLastIndex = tripIndex;
                dragMeta = ev.metaKey || ev.ctrlKey;
            });

            legDiv.addEventListener('click', ev => {
                if (ev.target.closest && ev.target.closest('.leg-corner-link')) return;
                if (ev.target.classList.contains('leg-cb')) return;
                if (blockNextLegClicks > 0) {
                    blockNextLegClicks--;
                    return;
                }
                toggleId(trip.id);
            });

            legDiv.addEventListener('mouseenter', () => setMapRouteHoverTrip(trip.id));

            legsList.appendChild(legDiv);
        });

        legsScroll.addEventListener('mouseleave', () => clearMapRouteHoverTrip());

        trips.forEach(t => {
            if (t.type === 'ferry') {
                t.computedDistanceKm = t.distance;
                refreshLegMetricsLine(t);
            }
        });

        /**
         * Pick the best default leg on first load:
         *   1. Leg whose calendar date equals “today” (departure day for that segment)
         *   2. Leg in progress: reference day is on or after this leg's date and before the next leg's date
         *   3. Earliest future leg (before trip starts)
         *   4. Latest dated leg if the whole trip is past
         *   5. trips[0]
         */
        function pickDefaultTrip() {
            if (!trips.length) return null;
            const sorted = [...trips].sort((a, b) => {
                const da = parseTripListDate(a.date);
                const db = parseTripListDate(b.date);
                const ta = da ? da.getTime() : Number.MAX_SAFE_INTEGER;
                const tb = db ? db.getTime() : Number.MAX_SAFE_INTEGER;
                return ta - tb;
            });
            const today = sorted.find(t => legCalendarKind(t) === 'today');
            if (today) return today;

            const ref = legListReferenceMidnight().getTime();
            for (let i = 0; i < sorted.length; i++) {
                const t = sorted[i];
                const d0 = parseTripListDate(t.date);
                if (!d0) continue;
                const t0 = startOfLocalDay(d0).getTime();
                const next = sorted[i + 1];
                const d1 = next ? parseTripListDate(next.date) : null;
                const t1 = d1 != null ? startOfLocalDay(d1).getTime() : Number.POSITIVE_INFINITY;
                if (ref >= t0 && ref < t1) return t;
            }

            const next = sorted.find(t => legCalendarKind(t) === 'future');
            if (next) return next;
            for (let i = sorted.length - 1; i >= 0; i--) {
                if (parseTripListDate(sorted[i].date)) return sorted[i];
            }
            return trips[0];
        }

        applySelectionToDom();
        syncEtaFromHereUi();

        // Scroll the default leg into view in the sidebar.
        if (selectedIds.size) {
            const firstSelectedId = [...selectedIds][0];
            const defaultRow = document.querySelector(`.leg-item[data-leg-id="${firstSelectedId}"]`);
            if (defaultRow) defaultRow.scrollIntoView({ block: 'nearest', behavior: 'auto' });
        }

        if (trips.length > 0) {
            syncMapToSelection();
        }

    </script>
</body>
</html>
